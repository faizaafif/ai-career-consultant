<div class="container consultant-step">
  <div class="card step-card">

    <header class="step-header">
      <div class="step-eyebrow">Step 2 · Skills</div>
      <h2>Your skill set</h2>
      <p class="subtitle">
        Select the skills you currently have and rate your proficiency so the recommendations stay grounded in reality.
      </p>
    </header>

    <form [formGroup]="skillsForm">

      <!-- SKILL CHECKBOXES -->
      <div class="skills-list">
        <label
          *ngFor="let skill of availableSkills"
          class="skill-item"
        >
          <input
            type="checkbox"
            [checked]="isSkillSelected(skill)"
            (change)="toggleSkill(skill)"
          />
          {{ skill }}
        </label>
      </div>

      <!-- FormArray binding -->
      <div formArrayName="skills">

        <div
          class="level-section"
          *ngFor="let skillCtrl of skillsArray.controls; let i = index"
          [formGroupName]="i"
        >
          <strong>{{ skillCtrl.value.name }}</strong>

          <select formControlName="level">
            <option value="">Select proficiency</option>
            <option
              *ngFor="let level of proficiencyLevels"
              [value]="level"
            >
              {{ level }}
            </option>
          </select>

          <div
            class="error"
            *ngIf="
              skillCtrl.get('level')?.touched &&
              skillCtrl.get('level')?.invalid
            "
          >
            Please select proficiency level
          </div>
        </div>

      </div>

      <!-- ACTION BUTTONS -->
      <div class="actions">
        <button type="button" class="secondary" (click)="back()">
          ← Back
        </button>

        <button type="button" class="primary" (click)="next()">
          Next →
        </button>
      </div>

    </form>
  </div>
</div>
